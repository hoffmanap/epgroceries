name: Weekly Grocery Scrape

on:
  schedule:
    - cron: '0 13 * * 3'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    # This line explicitly asks for write permission
    permissions:
      contents: write
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated to v4

      - name: Set up Python
        uses: actions/setup-python@v5 # Updated to v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        run: python app.py

      - name: Commit and Push CSV
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add el_paso_grocery_comparison_sample.csv
          # The 'exit 0' prevents the 128 error if nothing changed
          git commit -m "Update El Paso Prices" || exit 0
          git push
