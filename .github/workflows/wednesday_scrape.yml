name: Weekly Grocery Scrape

on:
  schedule:
    - cron: '0 13 * * 3'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Scraper
        run: python app.py

      - name: Commit and Push CSV
        run: |
          git config --global user.name 'GitHub Action'
          git config --global user.email 'action@github.com'
          git add el_paso_grocery_comparison_sample.csv
          git commit -m "Update El Paso Prices" || echo "No changes to commit"
          git push
